_format_version: "3.0"

# --- Global Plugins (seguridad) ---
plugins:
  - name: rate-limiting
    config:
      minute: 100
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  - name: response-transformer
    config:
      add:
        headers:
          - "X-Content-Type-Options: nosniff"
          - "X-Frame-Options: DENY"
          - "X-XSS-Protection: 1; mode=block"
          - "Referrer-Policy: strict-origin-when-cross-origin"
          - "Permissions-Policy: camera=(), microphone=(), geolocation=()"
          - "Strict-Transport-Security: max-age=31536000; includeSubDomains"
          - "Cache-Control: no-store"

  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:8000"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
      credentials: true
      max_age: 3600

  - name: request-size-limiting
    config:
      allowed_payload_size: 2

services:
  - name: cua-orq
    url: http://cua-orq:3001
    routes:
      - name: orq-routes
        paths:
          - /api/workflow
        strip_path: false

  - name: srv-contratacion
    url: http://srv-contratacion:3002
    routes:
      - name: contratacion-routes
        paths:
          - /api/contrataciones
        strip_path: false

  - name: srv-usuarios
    url: http://srv-contratacion:3002
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 10
              policy: local

  - name: srv-reportes
    url: http://srv-contratacion:3002
    routes:
      - name: reportes-routes
        paths:
          - /api/reportes
        strip_path: false

  - name: cargo-his
    url: http://srv-contratacion:3002
    routes:
      - name: cargo-his-routes
        paths:
          - /api/cargo-his
        strip_path: false

  - name: adp-buk
    url: http://adp-buk:3005
    routes:
      - name: buk-routes
        paths:
          - /api/buk
        strip_path: false

  - name: adp-sap
    url: http://adp-sap:3006
    routes:
      - name: sap-routes
        paths:
          - /api/sap
        strip_path: false

  - name: adp-azuread
    url: http://adp-azuread:3007
    routes:
      - name: azuread-routes
        paths:
          - /api/azure-ad
        strip_path: false

  - name: cua-page
    url: http://cua-page:3000
    routes:
      - name: frontend-routes
        paths:
          - /
        strip_path: false
