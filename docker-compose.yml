version: '3.8'

networks:
  m1-bf-net:
    driver: bridge

volumes:
  pg-data:

services:
  # --- Base de datos ---
  cua-postgres:
    image: postgres:15-alpine
    container_name: cua-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Puerto NO expuesto al host por seguridad (acceso solo via red interna Docker)
    # ports:
    #   - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/00-init.sql:/docker-entrypoint-initdb.d/00-init.sql
      - ./infra/postgres/01-contratacion.sql:/docker-entrypoint-initdb.d/01-contratacion.sql
      - ./infra/postgres/01b-workflow.sql:/docker-entrypoint-initdb.d/01b-workflow.sql
      - ./infra/postgres/02-usuarios.sql:/docker-entrypoint-initdb.d/02-usuarios.sql
      - ./infra/postgres/03-reportes.sql:/docker-entrypoint-initdb.d/03-reportes.sql
      - ./infra/postgres/04-seed.sql:/docker-entrypoint-initdb.d/04-seed.sql
      - ./infra/postgres/05-security-upgrade.sql:/docker-entrypoint-initdb.d/05-security-upgrade.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - m1-bf-net

  # --- API Gateway ---
  cua-kong:
    image: kong:3.6
    container_name: cua-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "127.0.0.1:8001"
      KONG_SSL_CERT: /etc/kong/certs/server.crt
      KONG_SSL_CERT_KEY: /etc/kong/certs/server.key
      KONG_LOG_LEVEL: info
    ports:
      - "8000:8000"
      - "8443:8443"
      # Admin port NO expuesto (127.0.0.1 only)
    volumes:
      - ./infra/kong/kong.yml:/etc/kong/kong.yml:ro
      - ./infra/certs:/etc/kong/certs:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      cua-orq:
        condition: service_healthy
      srv-contratacion:
        condition: service_healthy
      srv-usuarios:
        condition: service_healthy
      srv-reportes:
        condition: service_healthy
      adp-buk:
        condition: service_healthy
      adp-sap:
        condition: service_healthy
      adp-azuread:
        condition: service_healthy
      cua-page:
        condition: service_healthy
    networks:
      - m1-bf-net

  # --- Orquestador ---
  cua-orq:
    build: ./services/cua-orq
    container_name: cua-orq
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      MOCK_MODE: ${MOCK_MODE}
      NODE_ENV: ${NODE_ENV}
      ADP_BUK_URL: http://adp-buk:3005
      ADP_SAP_URL: http://adp-sap:3006
      ADP_AZUREAD_URL: http://adp-azuread:3007
      SRV_CONTRATACION_URL: http://srv-contratacion:3002
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      cua-postgres:
        condition: service_healthy
    networks:
      - m1-bf-net

  # --- Servicios Core ---
  srv-contratacion:
    build: ./services/srv-contratacion
    container_name: srv-contratacion
    environment:
      PORT: 3002
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: "http://cua-page:3000,http://localhost:8000"
      NODE_ENV: ${NODE_ENV}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      cua-postgres:
        condition: service_healthy
    networks:
      - m1-bf-net

  srv-usuarios:
    build: ./services/srv-usuarios
    container_name: srv-usuarios
    environment:
      PORT: 3003
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      cua-postgres:
        condition: service_healthy
    networks:
      - m1-bf-net

  srv-reportes:
    build: ./services/srv-reportes
    container_name: srv-reportes
    environment:
      PORT: 3004
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      cua-postgres:
        condition: service_healthy
    networks:
      - m1-bf-net

  # --- Adaptadores ---
  adp-buk:
    build: ./services/adp-buk
    container_name: adp-buk
    environment:
      PORT: 3005
      MOCK_MODE: ${MOCK_MODE}
      NODE_ENV: ${NODE_ENV}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - m1-bf-net

  adp-sap:
    build: ./services/adp-sap
    container_name: adp-sap
    environment:
      PORT: 3006
      MOCK_MODE: ${MOCK_MODE}
      NODE_ENV: ${NODE_ENV}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3006/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - m1-bf-net

  adp-azuread:
    build: ./services/adp-azuread
    container_name: adp-azuread
    environment:
      PORT: 3007
      MOCK_MODE: ${MOCK_MODE}
      NODE_ENV: ${NODE_ENV}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3007/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - m1-bf-net

  # --- Frontend ---
  cua-page:
    build: ./services/cua-page
    container_name: cua-page
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV}
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - m1-bf-net
